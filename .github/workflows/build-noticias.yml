name: Generar noticias.json y feed.xml

on:
  push:
    branches: [main]
    paths:
      - "noticias/**"
      - ".github/workflows/build-noticias.yml"
      - "scripts/build.py"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generar noticias.json y feed.xml
        run: python3 scripts/build.py

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json feed.xml
          git diff --cached --quiet || git commit -m "chore: actualizar noticias.json y feed.xml [skip ci]"
          git push