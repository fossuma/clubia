name: Generar noticias.json

on:
  push:
    branches: [main]
    paths:
      - "_noticias/**"
      - ".github/workflows/build-noticias.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generar noticias.json desde _noticias/*.md
        run: |
          python3 - <<'EOF'
          import os, json, re
          from datetime import datetime

          FOLDER = "noticias"
          OUT    = "noticias.json"

          def parse_fm(text):
              m = re.match(r"^---\r?\n(.*?)\r?\n---\r?\n?", text, re.DOTALL)
              fm, body = {}, text
              if m:
                  body = text[m.end():]
                  for line in m.group(1).splitlines():
                      if ":" not in line:
                          continue
                      key, _, val = line.partition(":")
                      key, val = key.strip(), val.strip().strip('"\'')
                      fm[key] = val
              # tags: "[a, b]" o "a, b"
              if "tags" in fm:
                  fm["tags"] = [t.strip() for t in re.sub(r"[\[\]]", "", fm["tags"]).split(",") if t.strip()]
              fm["body"] = body.strip()
              return fm

          posts = []
          if os.path.isdir(FOLDER):
              for fname in os.listdir(FOLDER):
                  if not fname.endswith(".md"):
                      continue
                  with open(os.path.join(FOLDER, fname), encoding="utf-8") as f:
                      fm = parse_fm(f.read())
                  if fm.get("draft") in ("true", True):
                      continue
                  posts.append(fm)

          posts.sort(key=lambda p: p.get("date", ""), reverse=True)

          with open(OUT, "w", encoding="utf-8") as f:
              json.dump(posts, f, ensure_ascii=False, indent=2)

          print(f"✅  {len(posts)} noticia(s) exportadas a {OUT}")
          EOF

      - name: Commit noticias.json si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json
          git diff --cached --quiet || git commit -m "chore: actualizar noticias.json [skip ci]"
          git push